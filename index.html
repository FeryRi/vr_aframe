<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>A-Frame AR con hit-test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

    <!-- A-Frame 1.7.x con soporte AR/WebXR -->
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: transparent; /* deja ver la cámara (passthrough) */
      }
    </style>
  </head>

  <body>
    <!--
      Escena en modo AR:
      - webxr pide la feature "hit-test" para detectar superficies reales.
      - ar-hit-test mueve el objeto #caja al tocar la pantalla / presionar trigger.
    -->
    <a-scene
      renderer="alpha: true; physicallyCorrectLights: true; colorManagement: true"
      webxr="optionalFeatures: hit-test;"
      ar-hit-test="target: #caja;"
      xr-mode-ui="XRMode: ar; enterAREnabled: true; enterVREnabled: false"
      vr-mode-ui="enabled: false"
      embedded
    >
      <!-- Cámara "normal" de A-Frame -->
      <a-entity camera position="0 1.6 0"></a-entity>

      <!-- Objeto que vamos a colocar en el mundo real -->
      <a-box
        id="caja"
        position="0 0 -1"
        depth="0.2"
        height="0.2"
        width="0.2"
        color="#FF4444"
        shadow="cast: true; receive: false"
        visible="false"
        hide-on-enter-ar="true"
      ></a-box>

      <!-- Luz para que se vea mejor -->
      <a-entity light="type: directional; intensity: 1" position="1 3 2"></a-entity>
      <a-entity light="type: ambient; intensity: 0.4"></a-entity>
    </a-scene>
  </body>
</html>
