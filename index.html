<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Fantasía Marina Oscura</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

    <!-- A-Frame 1.7.x -->
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
      }
      #ui {
        position: fixed;
        left: 16px;
        top: 16px;
        z-index: 10;
        color: #d1e8ff;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        text-shadow: 0 0 12px rgba(0, 0, 0, 0.75);
      }
      #action {
        margin-top: 8px;
        font-size: 12px;
        opacity: 0.85;
      }
      a-scene {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>

  <body>
    <div id="ui">
      <div>Haz clic en el fondo 360 para sumergirte bajo el agua</div>
      <div id="action">Encuentra las burbujas y hazlas explotar con un clic</div>
    </div>

    <a-scene
      renderer="antialias: true; physicallyCorrectLights: true; colorManagement: true"
      fog="type: exponential; color: #0c1a33; density: 0.03"
      embedded
    >
      <a-assets>
        <img id="p1" src="360image.jpg" />
        <audio id="ambience" src="sound.mp3"></audio>
      </a-assets>

      <a-sky id="sky" class="clickable" src="#p1" rotation="0 -90 0"></a-sky>

      <a-entity light="type: ambient; color: #4a7a9e; intensity: 0.6"></a-entity>
      <a-entity light="type: point; color: #80d4ff; intensity: 1.2; distance: 20" position="-2 3 -1"></a-entity>
      <a-entity light="type: point; color: #9f94ff; intensity: 0.8; distance: 16" position="2 2 2"></a-entity>

      <a-entity id="rig" position="0 1.6 0">
        <a-camera look-controls="pointerLockEnabled: false" raycaster="objects: .clickable" cursor="rayOrigin: mouse"></a-camera>
      </a-entity>

      <a-entity id="waterSurface" position="0 0 -2">
        <a-plane width="20" height="20" color="#00294b" material="shader: flat; opacity: 0.06" rotation="-90 0 0"></a-plane>
      </a-entity>

      <a-entity id="underwater" visible="false">
        <a-entity position="0 0 -2">
          <a-plane width="20" height="20" color="#0d3250" material="shader: flat; opacity: 0.24"></a-plane>
        </a-entity>

        <a-entity id="bubbles">
          <a-sphere class="bubble" position="-1.2 0.5 -3.2" radius="0.18"
                    material="shader: standard; color: #b8eeff; opacity: 0.34; transparent: true; metalness: 0.75; roughness: 0.05; envMap: #p1"></a-sphere>
          <a-sphere class="bubble" position="0.7 0.2 -2.6" radius="0.14"
                    material="shader: standard; color: #dff7ff; opacity: 0.32; transparent: true; metalness: 0.72; roughness: 0.08; envMap: #p1"></a-sphere>
          <a-sphere class="bubble" position="1.4 0.8 -3.8" radius="0.22"
                    material="shader: standard; color: #a7e8ff; opacity: 0.28; transparent: true; metalness: 0.78; roughness: 0.04; envMap: #p1"></a-sphere>
          <a-sphere class="bubble" position="-0.4 0.9 -2.4" radius="0.12"
                    material="shader: standard; color: #c2f0ff; opacity: 0.30; transparent: true; metalness: 0.7; roughness: 0.06; envMap: #p1"></a-sphere>
          <a-sphere class="bubble" position="0.1 0.3 -3.4" radius="0.16"
                    material="shader: standard; color: #b1f0ff; opacity: 0.33; transparent: true; metalness: 0.74; roughness: 0.05; envMap: #p1"></a-sphere>
        </a-entity>

        <a-entity position="-2.2 0.2 -3.8">
          <a-box width="0.22" height="0.7" depth="0.18" material="color: #0b2c47; roughness: 0.6"></a-box>
          <a-box position="0.16 0.18 0" width="0.14" height="0.42" depth="0.14" material="color: #4c8cff; emissive: #4fbaff; emissiveIntensity: 0.2"></a-box>
        </a-entity>

        <a-entity position="2.2 0.1 -3.1">
          <a-cone radius-bottom="0.3" radius-top="0.05" height="1.0"
                  material="color: #3973a6; emissive: #62a8ff; emissiveIntensity: 0.2; opacity: 0.9; transparent: true"></a-cone>
        </a-entity>
      </a-entity>

      <a-entity sound="src: #ambience; loop: true; autoplay: true; volume: 0.4"></a-entity>

      <script>
        AFRAME.registerComponent('bubble-behavior', {
          init: function () {
            this.startY = this.el.object3D.position.y;
            this.speed = 0.35 + Math.random() * 0.25;
            this.phase = Math.random() * Math.PI * 2;
            this.el.addEventListener('click', () => {
              this.el.setAttribute('visible', 'false');
              this.el.setAttribute('animation__pop', 'property: scale; to: 0 0 0; dur: 220; easing: easeOutQuad');
            });
          },
          tick: function (time) {
            const t = time / 1000;
            this.el.object3D.position.y = this.startY + Math.sin(t * this.speed + this.phase) * 0.18;
            this.el.object3D.position.x += Math.sin(t * 0.18 + this.phase) * 0.0008;
            this.el.object3D.rotation.y += 0.008;
          }
        });

        AFRAME.registerComponent('dive-on-click', {
          init: function () {
            this.el.addEventListener('click', () => {
              const rig = document.querySelector('#rig');
              const underwater = document.querySelector('#underwater');
              const action = document.querySelector('#action');
              if (rig) {
                rig.object3D.position.set(0, 0.4, 0);
              }
              if (underwater) {
                underwater.setAttribute('visible', 'true');
              }
              if (action) {
                action.textContent = '¡Explota las burbujas tocándolas!';
              }
              this.el.sceneEl.setAttribute('fog', 'color: #06213d; density: 0.05');
            });
          }
        });

        AFRAME.registerComponent('clickable-sky', {
          init: function () {
            this.el.addEventListener('click', (evt) => {
              const camera = document.querySelector('[camera]');
              if (camera) camera.emit('sky-clicked');
            });
          }
        });

        document.querySelectorAll('.bubble').forEach((bubble) => {
          bubble.setAttribute('bubble-behavior', '');
        });

        document.querySelector('#sky').setAttribute('dive-on-click', '');
      </script>
    </a-scene>
  </body>
</html>
