<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>All Steps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Core -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- Postprocessing -->
  <script src="https://cdn.jsdelivr.net/gh/supermedium/superframe@master/components/postprocessing/dist/aframe-postprocessing-component.min.js"></script>
  <!-- Hybrid controls (adds movement-controls & laser-controls) -->
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@latest/dist/aframe-extras.min.js"></script>
  <style>body{margin:0;background:#000}</style>
</head>
<body>
  <a-scene
    renderer="physicallyCorrectLights: true; colorManagement: true; toneMapping: ACESFilmicToneMapping; antialias: true"
    shadow="type: pcfsoft"
    postprocessing="bloom: true; ssao: true">

    <!-- ===== ASSETS ===== -->
    <a-assets>
      <a-asset-item id="model" src="flecha.glb"></a-asset-item>

      <!-- 360 panos -->
      <img id="p1" src="360image01.jpg">
      <img id="p2" src="360image02.jpg">
      <img id="p3" src="360image03.jpg">

      <!-- Images -->
      <img id="toggleImg" src="ola.png">
      <!-- <img id="posterImg" src="poster.jpg"> -->
      <img id="texTexture" src="texture.jpg">

      <!-- Video + audio -->
      <video id="vid" src="video.mp4" preload="auto" muted playsinline webkit-playsinline loop></video>
      <audio id="beep" src="sound.mp3"></audio>
    </a-assets>

    <!-- SKY / ENV -->
    <a-sky id="sky" src="#p1" rotation="0 -90 0"></a-sky>

    <!-- LIGHTS -->
    <a-entity id="sun" light="type: directional; intensity: 1.25; castShadow: true"
              position="5 7 5" rotation="-45 45 0"></a-entity>
    <a-entity light="type: ambient; intensity: 0.35"></a-entity>

    <!-- ===== RIG + CAMERA + CONTROLS (PC keyboard + VR gamepad) ===== -->
    <!-- movement-controls handles keyboard (WASD/arrows) on desktop and thumbstick in VR -->
    <a-entity id="rig" position="0 1.6 0"
              movement-controls="controls: gamepad,keyboard; speed: 0.2">
      <a-entity id="camera" camera look-controls></a-entity>
      <!-- Laser pointers in VR (both hands) -->
      <a-entity laser-controls="hand: left"  raycaster="objects: .interactable"></a-entity>
      <a-entity laser-controls="hand: right" raycaster="objects: .interactable"></a-entity>
    </a-entity>

    <!-- Mouse ray for desktop interaction -->
    <a-entity cursor="rayOrigin: mouse" raycaster="objects: .interactable"></a-entity>

    <!-- TRANSPARENT SHADOW-ONLY GROUND -->
    <a-plane id="ground" position="0 0 -4" rotation="-90 0 0" width="30" height="30"
             shadow="receive: true" shadow-receiver="opacity: 0.28"></a-plane>

    <!-- ===== CLUSTER A: BASIC + INTERACTION ===== -->
    <a-box position="-3 1 -4" rotation="0 30 0" color="#4CC3D9" shadow="cast: true"></a-box>

    <!-- Toggle image (starts hidden; image slightly nearer) -->
    <a-box id="toggleBox" position="-1.4 1.2 -4" color="#FFFFFF" width="0.9" height="0.6" depth="0.2"
           class="interactable" shadow="cast: true"></a-box>
    <a-image id="revealed-image" src="#toggleImg" position="-1.4 1.9 -3.8" width="1.2" height="0.7" visible="false"></a-image>

    <!-- Random color box -->
    <a-box position="0.4 1.2 -4" color="#4CC3D9" depth="0.6" height="0.6" width="0.6"
           class="interactable"
           onclick="this.setAttribute('color','#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'))"
           shadow="cast: true"></a-box>

    <!-- ===== CLUSTER B: TELEPORT ===== -->
    <a-box position="2.2 1.2 -4" color="#FFC107" depth="0.6" height="0.6" width="0.6"
           class="interactable" teleport-on-click shadow="cast: true"></a-box>
    <a-entity id="teleport-point" position="6 1.6 -4"></a-entity>

    <!-- ===== CLUSTER C: ANIMATION + AUDIO ===== -->
    <a-entity gltf-model="#model" position="6 1 -4" scale="1 1 1" shadow="cast: true"
              animation="property: object3D.position.y; to: 1.3; dir: alternate; dur: 2000; loop: true"></a-entity>

    <a-sphere position="7.6 1.1 -4" radius="0.35" color="#3399FF" class="interactable"
              onclick="document.querySelector('#audio').components.sound.playSound()"
              shadow="cast: true"></a-sphere>
    <a-sound id="audio" src="#beep" autoplay="false" position="7.6 1.1 -4"></a-sound>

    <!-- ===== CLUSTER D: VIDEO + POSTER ===== -->
    <a-video id="screen" class="interactable"
             src="#vid" position="-5 2 -8" width="4" height="2.25"
             material="shader: flat" shadow="cast: true"></a-video>
    <!-- <a-plane src="#posterImg" position="-7 2 -8" rotation="0 90 0" width="2" height="2.8" shadow="cast: true"></a-plane> -->

    <!-- ===== CLUSTER E: PANORAMA CYCLE ===== -->
    <a-sphere position="-1 0.8 -7.5" radius="0.25" color="#ff6666" class="interactable"
              onclick="document.querySelector('#sky').setAttribute('src','#p1')"></a-sphere>
    <a-sphere position="0 0.8 -7.5" radius="0.25" color="#66ff66" class="interactable"
              onclick="document.querySelector('#sky').setAttribute('src','#p2')"></a-sphere>
    <a-sphere position="1 0.8 -7.5" radius="0.25" color="#6666ff" class="interactable"
              onclick="document.querySelector('#sky').setAttribute('src','#p3')"></a-sphere>

    <!-- ===== CLUSTER F: MATERIALS ===== -->
    <a-sphere position="-1.8 1 -2" radius="0.5"
              material="metalness: 1; roughness: 0.05; color: #888"
              shadow="cast: true"></a-sphere>

    <a-box position="0 1 -2" depth="0.9" height="0.9" width="0.9"
           material="color: #aaf; opacity: 0.35; transparent: true; metalness: 0.15; roughness: 0.05"
           shadow="cast: true"></a-box>

    <a-cone position="1.8 1 -2" height="1.2" radius-bottom="0.6"
            material="color: #ff00ff; metalness: 0; roughness: 0.25"
            shadow="cast: true"></a-cone>

    <a-cylinder position="3.6 1 -2" radius="0.4" height="1.5"
                material="src: #texTexture; roughness: 0.4; metalness: 0.05"
                shadow="cast: true"></a-cylinder>

  </a-scene>

  <!-- ===== SCRIPTS ===== -->
  <script>
    // Teleport component
    AFRAME.registerComponent('teleport-on-click', {
      init: function () {
        this.el.addEventListener('click', () => {
          const rig = document.querySelector('#rig');
          const p = document.querySelector('#teleport-point').object3D.position;
          if (rig) rig.object3D.position.copy(p);
        });
      }
    });

    // Transparent shadow ground
    AFRAME.registerComponent('shadow-receiver', {
      schema: { opacity: { default: 0.28 } },
      init() {
        this.apply = this.apply.bind(this);
        this.el.addEventListener('object3dset', this.apply);
        this.apply();
      },
      remove() { this.el.removeEventListener('object3dset', this.apply); },
      apply() {
        const mesh = this.el.getObject3D('mesh');
        if (!mesh) return;
        mesh.traverse(o => {
          if (o.isMesh) {
            o.material = new THREE.ShadowMaterial({ opacity: this.data.opacity });
            o.material.depthWrite = false;
            o.receiveShadow = true;
          }
        });
      }
    });
    document.addEventListener('DOMContentLoaded', () => {
      const ground = document.getElementById('ground');
      if (ground) ground.setAttribute('shadow-receiver', 'opacity: 0.28');
    });

    const scene = document.querySelector('a-scene');
    scene.addEventListener('loaded', () => {
      // Soften shadows
      const sun = document.getElementById('sun').getObject3D('light');
      if (sun && sun.shadow) {
        sun.shadow.mapSize.set(1024, 1024);
        sun.shadow.radius = 3;
        sun.shadow.bias = -0.0001;
        sun.shadow.normalBias = 0.02;
        const cam = sun.shadow.camera;
        cam.near = 0.5; cam.far = 60;
        cam.left = -20; cam.right = 20; cam.top = 20; cam.bottom = -20;
        cam.updateProjectionMatrix();
      }

      // Mobile video unlock + click play/pause
      const videoEl = document.getElementById('vid');
      const screenEl = document.getElementById('screen');
      const unlock = () => { videoEl.play().then(()=>videoEl.pause()).catch(()=>{}); window.removeEventListener('touchstart', unlock); };
      window.addEventListener('touchstart', unlock, {once:true});
      screenEl.addEventListener('click', () => {
        if (videoEl.paused) { videoEl.play().catch(()=>{}); }
        else { videoEl.pause(); }
      });

      // Toggle image (starts hidden)
      const box = document.getElementById('toggleBox');
      const img = document.getElementById('revealed-image');
      box.addEventListener('click', () => {
        img.setAttribute('visible', !img.getAttribute('visible'));
      });

      // ENV reflections (PMREM) from current sky
      const renderer = scene.renderer;
      if (!renderer) return;
      const pmrem = new THREE.PMREMGenerator(renderer);

      function setEnvFrom(src) {
        new THREE.TextureLoader().load(
          src,
          (tex) => {
            if (THREE.SRGBColorSpace) tex.colorSpace = THREE.SRGBColorSpace;
            tex.mapping = THREE.EquirectangularReflectionMapping;
            scene.object3D.background = tex;
            const envRT = pmrem.fromEquirectangular(tex);
            scene.object3D.environment = envRT.texture;
          },
          undefined,
          (err) => console.warn('Env load error:', err)
        );
      }

      setEnvFrom(document.getElementById('p1').getAttribute('src'));
      const sky = document.getElementById('sky');
      sky.addEventListener('componentchanged', (e) => {
        if (e.detail.name === 'material' && e.detail.newData && e.detail.newData.src) {
          const id = e.detail.newData.src.replace('#', '');
          const el = document.getElementById(id);
          if (el) setEnvFrom(el.getAttribute('src'));
        }
      });
    });
  </script>
</body>
</html>
